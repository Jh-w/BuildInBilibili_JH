<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考毒舌助手 · 模拟演示 v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-page: #0b0b18;
    --bg-phone: #13132a;
    --bg-chat: #13132a;
    --bg-bubble-user: #4f46e5;
    --bg-bubble-ai: #1e1e3a;
    --text-bubble: #e8e8f4;
    --text-dim: #9999b8;
    --accent: #f43f5e;
    --border: rgba(255,255,255,0.05);
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-page);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== Phone ===== */
  .phone {
    width: 390px; height: 844px;
    background: var(--bg-phone);
    border-radius: 44px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow:
      0 0 0 3px #1c1c36,
      0 0 0 6px #141428,
      0 0 0 8px #0d0d1c,
      0 30px 80px rgba(0,0,0,0.65);
    position: relative;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #080814;
    border-radius: 20px;
    z-index: 10;
  }

  /* ===== Status Bar ===== */
  .status-bar {
    background: rgba(244,63,94,0.07);
    color: var(--accent);
    text-align: center;
    padding: 8px 20px;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(244,63,94,0.1);
  }
  .dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; margin-right:6px; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ===== Header ===== */
  .header {
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .header-avatar {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(244,63,94,0.25);
    position: relative;
  }
  .header-avatar::after {
    content: '';
    position: absolute; bottom: -1px; right: -1px;
    width: 12px; height: 12px;
    background: #4ade80; border-radius: 50%;
    border: 2px solid var(--bg-phone);
    box-shadow: 0 0 6px rgba(74,222,128,0.4);
  }
  .header-info { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; color: var(--text-bubble); display: flex; align-items: center; gap: 8px; }
  .header-badge { font-size: 10px; background: rgba(244,63,94,0.12); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-weight: 600; border: 1px solid rgba(244,63,94,0.2); }
  .header-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .header-actions { display: flex; gap: 16px; font-size: 18px; color: var(--text-dim); }

  /* ===== Chat ===== */
  .chat {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

  /* ===== Bubbles: unified dark theme, same text color ===== */
  .msg {
    max-width: 82%;
    animation: in 0.35s ease-out both;
    opacity: 0;
  }
  @keyframes in {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; }
  .msg.ai   { align-self: flex-start; }

  .bubble {
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 13.5px;
    line-height: 1.7;
    word-break: break-word;
    /* === 统一字体颜色 === */
    color: var(--text-bubble);
  }

  /* User: indigo, white text */
  .msg.user .bubble {
    background: var(--bg-bubble-user);
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }

  /* AI: dark navy, white text — 同色系不再跳戏 */
  .msg.ai .bubble {
    background: var(--bg-bubble-ai);
    border-bottom-left-radius: 6px;
  }

  /* AI accent stripe: only on roast bubbles */
  .msg.ai.roast .bubble {
    border-left: 3px solid var(--accent);
  }

  /* Prefix label */
  .prefix {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }

  /* Highlight: ONE accent color */
  .hl { color: var(--accent); font-weight: 600; }

  /* ===== Typing ===== */
  .typing-wrap { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
  .typing-wrap span { width: 6px; height: 6px; background: #666; border-radius: 50%; animation: bounce 1.5s infinite; }
  .typing-wrap span:nth-child(2) { animation-delay: 0.2s; }
  .typing-wrap span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-5px)} }

  /* ===== Center Cards ===== */
  .center-card { align-self: center; max-width: 100%; animation: in 0.45s ease-out both; opacity: 0; }
  .tagline-card { text-align: center; padding: 24px 16px; }
  .tagline-card .big { font-size: 22px; font-weight: 900; color: var(--text-bubble); line-height: 1.7; }
  .tagline-card .sub { font-size: 13px; color: var(--text-dim); margin-top: 6px; }
  .date-card {
    background: var(--accent);
    text-align: center; padding: 28px 32px;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(244,63,94,0.35);
  }
  .date-card .big { font-size: 26px; font-weight: 900; color: #fff; line-height: 1.6; letter-spacing: 1px; }
  .date-card .sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 4px; font-weight: 600; letter-spacing: 2px; }

  /* ===== Input Bar ===== */
  .input-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px 14px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  .attach-btn {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 18px; flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 10px 16px;
    color: #bbb; font-size: 13.5px; font-family: inherit; outline: none;
  }
  .input-field::placeholder { color: #444; }
  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent); border: none; border-radius: 12px;
    color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(244,63,94,0.3);
    transition: transform 0.15s;
  }
  .send-btn:hover { transform: scale(1.05); }

  /* ===== Controls ===== */
  .controls { position: fixed; bottom: 30px; right: 30px; display: flex; gap: 10px; z-index: 100; }
  .controls button { padding: 12px 24px; border: none; border-radius: 12px; font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 700; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 16px rgba(244,63,94,0.3); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(244,63,94,0.4); }
  .btn-ghost { background: rgba(255,255,255,0.06); color: #aaa; border: 1px solid rgba(255,255,255,0.08); }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="status-bar">
    <span class="dot"></span>毒舌模式已激活 — 你说的每句话它都会怼回来
  </div>
  <div class="header">
    <div class="header-avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">高考毒舌助手 <span class="header-badge">AI</span></div>
      <div class="header-subtitle">别的AI帮你算分，我帮你认清自己</div>
    </div>
    <div class="header-actions"><span>🔍</span><span>⋯</span></div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-bar">
    <div class="attach-btn">+</div>
    <input class="input-field" type="text" value="广东·物理类·625分·想学计算机" readonly>
    <button class="send-btn">↑</button>
  </div>
</div>

<div class="controls">
  <button class="btn-ghost" onclick="location.reload()">↻ 重播</button>
  <button class="btn-primary" onclick="startDemo()">▶ 开始演示</button>
</div>

<script>
const chat = document.getElementById('chat');

const sequence = [
  { d:600,  t:'user',    m:'广东·物理类·625分·想学计算机' },
  { d:1000, t:'typing' },
  { d:1600, t:'roast',   p:'😈 毒舌时间', m:'<span class="hl">625分想冲华科计算机？</span>你知道去年华科计算机在广东多少分吗？<span class="hl">651</span>。<br>你这分数连门卫的微信都加不上。' },
  { d:1800, t:'roast',   p:'', m:'深大计算机也别做梦了。人家虽然是双非，<span class="hl">分数线比你家门口985还高</span>。' },
  { d:1600, t:'roast',   p:'', m:'不过你比我预期好一点点——至少没说想冲清华。' },
  { d:1200, t:'typing' },
  { d:1600, t:'analysis',p:'📊 现实一点', m:'根据<span class="hl">2025年广东物理类</span>数据：<br><br>🔴 <b>冲刺</b>　华南理工 · 软件工程 <span class="hl">638</span><br>　　　　　电子科大 · 计科 <span class="hl">642</span><br><br>🟡 <b>稳妥</b>　哈工大深圳 · 智能科学 <span class="hl">628</span><br>　　　　　西电 · 计科 <span class="hl">620</span><br><br>🟢 <b>保底</b>　广工 · 计科 <span class="hl">598</span>' },
  { d:2000, t:'admit',   p:'🤖 AI自首', m:'以上数据来自公开渠道，我是AI不是算命先生。<br>最终决定问你自己和你爸妈——<br><span class="hl">但别问你二舅，他只会说"学计算机好啊出来修电脑"。</span>' },
  { d:2200, t:'tagline', m:'别的AI帮你算分<br>我帮你认清自己。', sub:'顺便让你笑出声。' },
  { d:1800, t:'date',    m:'6月23日 出分日<br>准时上线', sub:'带着你的分数来。' },
];

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function sd(){chat.scrollTo({top:chat.scrollHeight,behavior:'smooth'})}

function add(align,cls,prefix,html){
  const w=document.createElement('div');w.className=`msg ${align}`;if(cls)w.classList.add(cls);
  const b=document.createElement('div');b.className='bubble';
  b.innerHTML=(prefix?`<div class="prefix">${prefix}</div>`:'')+html;
  w.appendChild(b);chat.appendChild(w);sd();
}

let te=null;
function addTyping(){
  const w=document.createElement('div');w.className='msg ai';
  const b=document.createElement('div');b.className='bubble typing-wrap';
  b.innerHTML='<span></span><span></span><span></span>';
  w.appendChild(b);chat.appendChild(w);sd();return w;
}
function addCard(main,sub){
  const w=document.createElement('div');w.className='center-card';
  const c=document.createElement('div');c.className='tagline-card';
  c.innerHTML=`<div class="big">${main}</div>${sub?`<div class="sub">${sub}</div>`:''}`;
  w.appendChild(c);chat.appendChild(w);sd();
}
function addDate(main,sub){
  const w=document.createElement('div');w.className='center-card';
  const c=document.createElement('div');c.className='date-card';
  c.innerHTML=`<div class="big">${main}</div>${sub?`<div class="sub">${sub}</div>`:''}`;
  w.appendChild(c);chat.appendChild(w);sd();
}

async function startDemo(){
  chat.innerHTML='';
  document.querySelector('.input-field').value='广东·物理类·625分·想学计算机';
  for(const s of sequence){
    if(s.t==='typing'){te=addTyping();await sleep(s.d);if(te?.parentNode){te.remove();te=null;}continue;}
    if(te?.parentNode){te.remove();te=null;}
    if(s.t==='user')add('user','','',s.m);
    else if(s.t==='roast')add('ai','roast',s.p||'',s.m);
    else if(s.t==='analysis')add('ai','',s.p||'',s.m);
    else if(s.t==='admit')add('ai','',s.p||'',s.m);
    else if(s.t==='tagline')addCard(s.m,s.sub);
    else if(s.t==='date')addDate(s.m,s.sub);
    await sleep(s.d);
  }
}
setTimeout(startDemo,700);
</script>
</body>
</html>
