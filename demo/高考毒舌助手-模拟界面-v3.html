<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高考毒舌助手 · 模拟演示 v3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-page: #0d0d1a;
    --bg-phone: #1a1a2e;
    --bg-chat: #1a1a2e;
    --bg-bubble-ai: #f0f0f5;
    --bg-bubble-user: #4f46e5;
    --text-ai: #1a1a2e;
    --text-user: #ffffff;
    --text-secondary: #7a7a8c;
    --accent: #e94560;
    --accent-dim: #c73650;
    --border-subtle: rgba(255,255,255,0.06);
  }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-page);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ===== Phone Frame ===== */
  .phone {
    width: 390px;
    height: 844px;
    background: var(--bg-phone);
    border-radius: 44px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 0 0 3px #1e2038,
      0 0 0 6px #151728,
      0 0 0 8px #0f1020,
      0 30px 80px rgba(0,0,0,0.6);
    position: relative;
  }
  .phone::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 28px;
    background: #0a0b14;
    border-radius: 20px;
    z-index: 10;
  }

  /* ===== Status Bar ===== */
  .status-bar {
    background: rgba(233,69,96,0.08);
    color: var(--accent);
    text-align: center;
    padding: 8px 20px;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(233,69,96,0.1);
  }
  .status-bar .dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ===== Header ===== */
  .header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border-subtle);
  }
  .header-avatar {
    width: 44px; height: 44px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(233,69,96,0.25);
  }
  .header-avatar::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 12px; height: 12px;
    background: #4ade80;
    border-radius: 50%;
    border: 2px solid var(--bg-phone);
    box-shadow: 0 0 6px rgba(74,222,128,0.4);
  }
  .header-info { flex: 1; }
  .header-name {
    font-size: 16px; font-weight: 700; color: #e0e0f0;
    display: flex; align-items: center; gap: 8px;
  }
  .header-badge {
    font-size: 10px;
    background: rgba(233,69,96,0.12);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    border: 1px solid rgba(233,69,96,0.2);
  }
  .header-subtitle { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .header-actions { display: flex; gap: 16px; font-size: 18px; color: var(--text-secondary); }

  /* ===== Chat Area ===== */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }

  /* ===== Bubbles: Unified style ===== */
  .msg {
    max-width: 82%;
    animation: in 0.35s ease-out both;
    opacity: 0;
  }
  @keyframes in {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; }
  .msg.ai { align-self: flex-start; }

  .bubble {
    padding: 11px 15px;
    border-radius: 20px;
    font-size: 13.5px;
    line-height: 1.7;
    word-break: break-word;
  }

  /* --- User bubble: blue, white text --- */
  .msg.user .bubble {
    background: var(--bg-bubble-user);
    color: var(--text-user);
    border-bottom-right-radius: 6px;
    font-weight: 500;
  }

  /* --- AI bubble: light gray, dark text — ALL same --- */
  .msg.ai .bubble {
    background: var(--bg-bubble-ai);
    color: var(--text-ai);
    border-bottom-left-radius: 6px;
  }

  /* --- AI bubble left accent stripe (subtle, one color only) --- */
  .msg.ai.accent .bubble {
    border-left: 3px solid var(--accent);
  }

  /* --- Prefix label inside bubble --- */
  .prefix {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* === Text highlights: ONE accent color only === */
  .hl { color: var(--accent); font-weight: 600; }
  .hl-dim { color: #999; font-size: 0.92em; }

  /* ===== Typing ===== */
  .typing-wrap { display: flex; gap: 4px; padding: 12px 16px; align-items: center; }
  .typing-wrap span {
    width: 6px; height: 6px;
    background: #bbb;
    border-radius: 50%;
    animation: bounce 1.5s infinite;
  }
  .typing-wrap span:nth-child(2) { animation-delay: 0.2s; }
  .typing-wrap span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-5px); }
  }

  /* ===== Center Cards ===== */
  .center-card {
    align-self: center;
    max-width: 100%;
    animation: in 0.45s ease-out both;
    opacity: 0;
  }
  .tagline-card {
    text-align: center;
    padding: 24px 16px;
  }
  .tagline-card .big {
    font-size: 22px;
    font-weight: 900;
    color: #e0e0f0;
    line-height: 1.7;
    letter-spacing: 0.5px;
  }
  .tagline-card .sub {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
  .date-card {
    background: var(--accent);
    text-align: center;
    padding: 28px 32px;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(233,69,96,0.35);
  }
  .date-card .big {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    line-height: 1.6;
    letter-spacing: 1px;
  }
  .date-card .sub {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  /* ===== Input Bar ===== */
  .input-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px 14px;
    flex-shrink: 0;
    border-top: 1px solid var(--border-subtle);
  }
  .attach-btn {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary);
    font-size: 18px;
    flex-shrink: 0;
    border: 1px solid var(--border-subtle);
  }
  .input-field {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 10px 16px;
    color: #ccc;
    font-size: 13.5px;
    font-family: inherit;
    outline: none;
  }
  .input-field::placeholder { color: #444; }
  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 12px;
    border: none;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(233,69,96,0.3);
    transition: transform 0.15s;
  }
  .send-btn:hover { transform: scale(1.05); }

  /* ===== Controls ===== */
  .controls {
    position: fixed;
    bottom: 30px; right: 30px;
    display: flex; gap: 10px;
    z-index: 100;
  }
  .controls button {
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(233,69,96,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(233,69,96,0.4); }
  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<div class="phone" id="phone">
  <div class="status-bar">
    <span class="dot"></span>毒舌模式已激活 — 你说的每句话它都会怼回来
  </div>

  <div class="header">
    <div class="header-avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">
        高考毒舌助手
        <span class="header-badge">AI</span>
      </div>
      <div class="header-subtitle">别的AI帮你算分，我帮你认清自己</div>
    </div>
    <div class="header-actions">
      <span>🔍</span>
      <span>⋯</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-bar">
    <div class="attach-btn">+</div>
    <input class="input-field" type="text" value="广东·物理类·625分·想学计算机" readonly>
    <button class="send-btn">↑</button>
  </div>
</div>

<div class="controls">
  <button class="btn-ghost" onclick="location.reload()">↻ 重播</button>
  <button class="btn-primary" onclick="startDemo()">▶ 开始演示</button>
</div>

<script>
const chat = document.getElementById('chat');

// ================================================================
// Demo sequence
// ================================================================
const sequence = [
  // 1. User input
  { d: 600,  t: 'user',    m: '广东·物理类·625分·想学计算机' },

  // 2. Typing
  { d: 1000, t: 'typing' },

  // 3. Roast #1 — with accent stripe + prefix
  { d: 1600, t: 'roast', prefix: '😈 毒舌时间',
    m: '<span class="hl">625分想冲华科计算机？</span>你知道去年华科计算机在广东多少分吗？<span class="hl">651</span>。<br>你这分数连门卫的微信都加不上。' },

  // 4. Roast #2
  { d: 1800, t: 'roast', prefix: '',
    m: '深大计算机也别做梦了。人家虽然是双非，<span class="hl">分数线比你家门口985还高</span>。' },

  // 5. Roast #3
  { d: 1600, t: 'roast', prefix: '',
    m: '不过你比我预期好一点点——至少没说想冲清华。' },

  // 6. Typing
  { d: 1200, t: 'typing' },

  // 7. Analysis
  { d: 1600, t: 'analysis', prefix: '📊 现实一点',
    m: '根据<span class="hl">2025年广东物理类</span>数据：<br><br>'
     + '🔴 <b>冲刺</b>　华南理工 · 软件工程 <span class="hl">638</span><br>'
     + '　　　　　电子科大 · 计科 <span class="hl">642</span><br><br>'
     + '🟡 <b>稳妥</b>　哈工大深圳 · 智能科学 <span class="hl">628</span><br>'
     + '　　　　　西电 · 计科 <span class="hl">620</span><br><br>'
     + '🟢 <b>保底</b>　广工 · 计科 <span class="hl">598</span>'
  },

  // 8. AI自首
  { d: 2000, t: 'admit', prefix: '🤖 AI自首',
    m: '以上数据来自公开渠道，我是AI不是算命先生。<br>'
     + '最终决定问你自己和你爸妈——<br>'
     + '<span class="hl">但别问你二舅，他只会说"学计算机好啊出来修电脑"。</span>'
  },

  // 9. Tagline
  { d: 2200, t: 'tagline', m: '别的AI帮你算分<br>我帮你认清自己。', sub: '顺便让你笑出声。' },

  // 10. Date
  { d: 1800, t: 'date', m: '6月23日 出分日<br>准时上线', sub: '带着你的分数来。' },
];

// ================================================================
// Rendering
// ================================================================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollDown() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function addBubble(align, clsExtra, prefix, html) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${align}`;
  if (clsExtra) wrap.classList.add(clsExtra);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  let content = '';
  if (prefix) content += `<div class="prefix">${prefix}</div>`;
  content += html;
  bubble.innerHTML = content;

  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  scrollDown();
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai';
  const bub = document.createElement('div');
  bub.className = 'bubble typing-wrap';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scrollDown();
  return wrap;
}

function addTagline(main, sub) {
  const wrap = document.createElement('div');
  wrap.className = 'center-card';
  const card = document.createElement('div');
  card.className = 'tagline-card';
  card.innerHTML = `<div class="big">${main}</div>`;
  if (sub) card.innerHTML += `<div class="sub">${sub}</div>`;
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollDown();
}

function addDateCard(main, sub) {
  const wrap = document.createElement('div');
  wrap.className = 'center-card';
  const card = document.createElement('div');
  card.className = 'date-card';
  card.innerHTML = `<div class="big">${main}</div>`;
  if (sub) card.innerHTML += `<div class="sub">${sub}</div>`;
  wrap.appendChild(card);
  chat.appendChild(wrap);
  scrollDown();
}

let typingEl = null;

async function startDemo() {
  chat.innerHTML = '';
  document.querySelector('.input-field').value = '广东·物理类·625分·想学计算机';

  for (const s of sequence) {
    if (s.t === 'typing') {
      typingEl = addTyping();
      await sleep(s.d);
      if (typingEl?.parentNode) { typingEl.remove(); typingEl = null; }
      continue;
    }
    if (typingEl?.parentNode) { typingEl.remove(); typingEl = null; }

    if (s.t === 'user') {
      addBubble('user', '', '', s.m);
    } else if (s.t === 'roast') {
      addBubble('ai', 'accent', s.prefix || '', s.m);
    } else if (s.t === 'analysis') {
      addBubble('ai', '', s.prefix || '', s.m);
    } else if (s.t === 'admit') {
      addBubble('ai', '', s.prefix || '', s.m);
    } else if (s.t === 'tagline') {
      addTagline(s.m, s.sub);
    } else if (s.t === 'date') {
      addDateCard(s.m, s.sub);
    }
    await sleep(s.d);
  }
}

setTimeout(startDemo, 700);
</script>
</body>
</html>
