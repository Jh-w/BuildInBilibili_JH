<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>高考毒舌助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

  :root {
    --bg: #0b0b1a; --bg-chat: #0b0b1a;
    --bubble-user: #4f46e5; --bubble-ai: #14142e;
    --text: #eaeaef; --text-dim: #8888a8; --text-faint: #5a5a7a;
    --accent: #f43f5e; --accent-glow: rgba(244,63,94,0.12);
    --border: rgba(255,255,255,0.05); --card-bg: rgba(255,255,255,0.015);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #070711; display: flex; justify-content: center;
    align-items: center; min-height: 100vh; min-height: 100dvh;
    padding: 8px;
  }

  .app {
    width: 100%; max-width: 420px; height: 100vh; height: 100dvh;
    background: var(--bg); border-radius: 28px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 0 0 2px #181830, 0 0 0 4px #101024, 0 0 0 6px #080814, 0 20px 60px rgba(0,0,0,0.7);
    position: relative;
  }
  @media (max-width: 440px) {
    .app { border-radius: 0; max-width: 100%; box-shadow: none; }
    body { padding: 0; }
  }

  /* ── Status Bar ── */
  .status-bar {
    background: linear-gradient(135deg, rgba(244,63,94,0.1), rgba(244,63,94,0.03));
    color: var(--accent); text-align: center; padding: 8px 16px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    flex-shrink: 0; border-bottom: 1px solid rgba(244,63,94,0.08);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .status-bar .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  .countdown-num { font-weight: 900; font-size: 13px; }

  /* ── Header ── */
  .header {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    flex-shrink: 0; border-bottom: 1px solid var(--border);
  }
  .header-avatar {
    width: 40px; height: 40px; background: var(--accent); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; box-shadow: 0 3px 12px rgba(244,63,94,0.25);
    position: relative;
  }
  .header-avatar::after {
    content: ''; position: absolute; bottom: -1px; right: -1px;
    width: 10px; height: 10px; background: #4ade80; border-radius: 50%;
    border: 2px solid var(--bg);
  }
  .header-info { flex: 1; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-subtitle { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .header-roast {
    display: flex; align-items: center; gap: 3px;
    background: rgba(244,63,94,0.08); padding: 4px 10px;
    border-radius: 14px; border: 1px solid rgba(244,63,94,0.1);
    font-size: 10px; color: var(--accent); font-weight: 700;
    flex-shrink: 0;
  }
  .header-roast .pep { font-size: 12px; }
  .header-roast .pep.dim { opacity: 0.2; filter: grayscale(1); }

  /* ── Quick Chips ── */
  .quick-chips {
    display: flex; gap: 6px; padding: 8px 14px; flex-shrink: 0;
    overflow-x: auto; scrollbar-width: none;
  }
  .quick-chips::-webkit-scrollbar { display: none; }
  .quick-chip {
    font-size: 11px; padding: 7px 14px; border-radius: 16px; white-space: nowrap;
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer; font-family: inherit;
    transition: all 0.15s; flex-shrink: 0;
  }
  .quick-chip:hover { background: rgba(244,63,94,0.06); border-color: rgba(244,63,94,0.15); color: var(--text); }
  .quick-chip:active { transform: scale(0.95); }

  /* ── Chat Area ── */
  .chat {
    flex: 1; overflow-y: auto; padding: 10px 14px;
    display: flex; flex-direction: column; gap: 8px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 2px; }
  .chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.04); border-radius: 2px; }

  /* Welcome */
  .welcome {
    align-self: center; text-align: center; padding: 40px 20px;
    animation: fadeUp 0.5s ease-out;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .welcome .icon { font-size: 48px; margin-bottom: 12px; }
  .welcome h2 { font-size: 18px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
  .welcome p { font-size: 12px; color: var(--text-dim); line-height: 1.8; }

  /* ── Messages ── */
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg {
    max-width: 86%; animation: msgIn 0.3s ease-out both;
    display: flex; flex-direction: column;
  }
  .msg.user { align-self: flex-end; }
  .msg.ai   { align-self: flex-start; }
  .bubble {
    padding: 10px 14px; border-radius: 18px;
    font-size: 13.5px; line-height: 1.75; word-break: break-word;
    color: var(--text);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    border-bottom-right-radius: 6px; font-weight: 500;
  }
  .msg.ai .bubble {
    background: var(--bubble-ai);
    border-bottom-left-radius: 6px;
  }

  /* Roast style */
  .msg.ai.roast .bubble {
    border-left: 3px solid var(--accent);
    background: rgba(244,63,94,0.04);
  }

  /* Prefix */
  .prefix {
    display: block; font-size: 10.5px; font-weight: 700;
    color: var(--accent); margin-bottom: 5px; letter-spacing: 0.5px;
  }

  /* Highlight */
  .hl { color: var(--accent); font-weight: 600; }

  /* Share button on AI messages */
  .share-btn {
    display: none; align-self: flex-end;
    margin-top: 4px; font-size: 10px; color: var(--accent);
    cursor: pointer; padding: 4px 10px; border-radius: 10px;
    background: rgba(244,63,94,0.06); border: 1px solid rgba(244,63,94,0.1);
    font-family: inherit; transition: all 0.15s;
  }
  .msg.ai:hover .share-btn { display: inline-block; }
  .share-btn:hover { background: rgba(244,63,94,0.15); }
  .share-btn:active { transform: scale(0.93); }

  /* ── Typing ── */
  .typing {
    display: flex; gap: 5px; padding: 14px 16px; align-items: center;
    align-self: flex-start; animation: msgIn 0.2s ease-out both;
  }
  .typing span {
    width: 7px; height: 7px; background: #555; border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-6px)} }

  /* ── Input Bar ── */
  .input-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px 12px; flex-shrink: 0;
    border-top: 1px solid var(--border);
  }
  .input-field {
    flex: 1; background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.05); border-radius: 20px;
    padding: 10px 16px; color: var(--text); font-size: 13px;
    font-family: inherit; outline: none; transition: all 0.2s;
  }
  .input-field::placeholder { color: #444; }
  .input-field:focus { border-color: rgba(244,63,94,0.2); box-shadow: 0 0 0 3px rgba(244,63,94,0.04); }
  .send-btn {
    width: 38px; height: 38px; background: var(--accent); border: none;
    border-radius: 14px; color: #fff; font-size: 14px; cursor: pointer;
    flex-shrink: 0; box-shadow: 0 4px 12px rgba(244,63,94,0.3);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .send-btn:hover { transform: scale(1.04); box-shadow: 0 6px 18px rgba(244,63,94,0.4); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.35; transform: none; box-shadow: none; }

  /* ── Toast ── */
  .toast {
    position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
    background: rgba(244,63,94,0.92); color: #fff; padding: 8px 18px;
    border-radius: 16px; font-size: 12px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s; z-index: 20; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="app">
  <!-- Countdown -->
  <div class="status-bar" id="statusBar">
    <span class="dot"></span>距高考出分日还有 <span class="countdown-num" id="countdown">?</span> 天 — 毒舌蓄力中
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">🎓</div>
    <div class="header-info">
      <div class="header-name">高考毒舌助手</div>
      <div class="header-subtitle">别的AI帮你算分，我帮你认清自己</div>
    </div>
    <div class="header-roast" id="roastLevel">
      <span class="pep">🌶️</span><span class="pep">🌶️</span><span class="pep">🌶️</span>
      <span class="pep dim">🌶️</span><span class="pep dim">🌶️</span>
      毒舌 Lv.?
    </div>
  </div>

  <!-- Quick chips -->
  <div class="quick-chips">
    <div class="quick-chip" onclick="quickSend('广东 物理类 625分 想学计算机')">625分 · 计算机</div>
    <div class="quick-chip" onclick="quickSend('广东 物理类 580分 想学临床医学')">580分 · 医学</div>
    <div class="quick-chip" onclick="quickSend('广东 物理类 450分 不知道学什么')">450分 · 迷茫</div>
    <div class="quick-chip" onclick="quickSend('生物医学工程这个专业怎么样')">专业翻译官</div>
  </div>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="icon">😈</div>
      <h2>输入你的分数，开始挨骂</h2>
      <p>
        格式：省份 + 选科 + 分数 + 意向<br>
        例如：广东 物理类 625分 想学计算机<br><br>
        也可以问：「XX专业怎么样？」
      </p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <input class="input-field" id="input" type="text"
           placeholder="输入分数或问题..."
           autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="send()">↑</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">📸 截图卡片已生成</div>
</div>

<script>
// ── State ──
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const toast = document.getElementById('toast');
let isLoading = false;

// ── Countdown ──
function updateCountdown() {
  const target = new Date('2026-06-23');
  const now = new Date();
  const days = Math.max(0, Math.ceil((target - now) / (1000*60*60*24)));
  document.getElementById('countdown').textContent = days;
}
updateCountdown();

// ── Roast level indicator ──
function setRoastLevel(level) {
  const peppers = document.querySelectorAll('#roastLevel .pep');
  peppers.forEach((p, i) => {
    if (i < level) { p.classList.remove('dim'); }
    else { p.classList.add('dim'); }
  });
  document.querySelector('#roastLevel').childNodes[
    document.querySelector('#roastLevel').childNodes.length - 1
  ].textContent = `毒舌 Lv.${level}`;
}

// ── Scroll ──
function sd() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

// ── Toast ──
function showToast(msg) {
  toast.textContent = msg || '📸 分享卡片已生成';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

// ── Add Message ──
function addUserMessage(text) {
  const w = document.createElement('div'); w.className = 'msg user';
  const b = document.createElement('div'); b.className = 'bubble';
  b.textContent = text; w.appendChild(b);
  chat.appendChild(w); sd();
}

function addAiMessage(html, isRoast) {
  const w = document.createElement('div');
  w.className = 'msg ai' + (isRoast ? ' roast' : '');
  const b = document.createElement('div'); b.className = 'bubble';
  b.innerHTML = html;
  w.appendChild(b);

  // Share button
  const share = document.createElement('button'); share.className = 'share-btn';
  share.textContent = '📸 分享'; share.title = '生成分享卡片';
  share.onclick = (e) => { e.stopPropagation(); showToast(); };
  w.appendChild(share);

  chat.appendChild(w); sd();
}

function addTyping() {
  const w = document.createElement('div'); w.className = 'typing';
  w.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(w); sd();
  return w;
}

// ── Format AI response ──
function formatReply(text) {
  // Convert newlines to <br>
  let html = text.replace(/\n/g, '<br>');

  // Highlight numbers with unit
  html = html.replace(/(\d{3,4})分/g, '<span class="hl">$1分</span>');
  html = html.replace(/(\d{3,4})(?![分<])/g, '<span class="hl">$1</span>');

  // Detect poison level from content to set roast level
  if (text.includes('😈')) setRoastLevel(4);
  else if (text.includes('毒舌')) setRoastLevel(3);
  else if (text.includes('不定义你的人生')) setRoastLevel(1);

  return html;
}

// ── Send ──
async function send() {
  const message = input.value.trim();
  if (!message || isLoading) return;

  // Remove welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  addUserMessage(message);
  input.value = '';
  isLoading = true;
  sendBtn.disabled = true;

  // Typing indicator
  const typing = addTyping();

  try {
    const resp = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });

    if (!resp.ok) throw new Error('API error');

    // Remove typing
    typing.remove();

    // Stream reading
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let bubbleAdded = false;
    let currentBubble = null;

    // Add empty bubble first
    const w = document.createElement('div');
    w.className = 'msg ai';
    const b = document.createElement('div'); b.className = 'bubble';
    b.textContent = '';
    w.appendChild(b);

    // Share button
    const share = document.createElement('button'); share.className = 'share-btn';
    share.textContent = '📸 分享';
    share.onclick = (e) => { e.stopPropagation(); showToast(); };
    w.appendChild(share);

    chat.appendChild(w);
    currentBubble = b;
    sd();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const text = decoder.decode(value, { stream: true });
      const lines = text.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;

        try {
          const parsed = JSON.parse(data);
          if (parsed.content) {
            fullText += parsed.content;
            // Apply formatting in real-time
            let formatted = fullText.replace(/\n/g, '<br>');
            formatted = formatted.replace(/(\d{3,4})分/g, '<span class="hl">$1分</span>');
            currentBubble.innerHTML = formatted;
            sd();
          } else if (parsed.error) {
            currentBubble.innerHTML = '😅 毒舌AI嗓子哑了，请稍后再试...';
            break;
          }
        } catch(e) {}
      }
    }

    // Final format
    currentBubble.innerHTML = formatReply(fullText);

    // Add roast class if it contains roast content
    if (fullText.includes('😈') || fullText.includes('毒舌')) {
      w.classList.add('roast');
    }

  } catch (e) {
    typing.remove();
    // Fallback: non-streaming
    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      });
      const data = await resp.json();
      if (data.reply) {
        const isRoast = data.reply.includes('😈') || data.reply.includes('毒舌');
        addAiMessage(formatReply(data.reply), isRoast);
      } else {
        addAiMessage('😅 毒舌AI今天嗓子哑了，请稍后再试...', false);
      }
    } catch (e2) {
      addAiMessage('😅 连接失败，请检查网络后重试。', false);
    }
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// ── Quick send ──
function quickSend(msg) {
  input.value = msg;
  send();
}

// ── Keyboard ──
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

input.focus();
</script>
</body>
</html>
